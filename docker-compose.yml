services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sniplink
      POSTGRES_USER: sniplink
      POSTGRES_PASSWORD: sniplink
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sniplink -d sniplink"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      args:
        PROJECT: SnipLink.Web
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=db;Port=5432;Database=sniplink;Username=sniplink;Password=sniplink"
      ConnectionStrings__Redis: "redis:6379"
      SnipLink__BaseUrl: "http://localhost:8080"
      SnipLink__IpHashSalt: "compose-demo-salt-change-me"
      SnipLink__EnableSwagger: "true"
      SnipLink__Seed: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      args:
        PROJECT: SnipLink.Worker
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=db;Port=5432;Database=sniplink;Username=sniplink;Password=sniplink"
      SnipLink__IpHashSalt: "compose-demo-salt-change-me"
      Worker__Interval: "00:01:00"
    depends_on:
      db:
        condition: service_healthy
      # The web service owns migrations; the worker retries each cycle until the schema exists.
      web:
        condition: service_started

volumes:
  pgdata:
